    <div class="jumbotron text-center">
      <div class="container">
        <h1>Form Pemesanan</h1>

        <p>Isi data berikut untuk melakukan pemesanan.</p>
      </div>
    </div>

    <div class="container">
      <div class="panel panel-success">
        <div class="panel-heading">Data Pemesanan</div>

        <div class="panel-body">
          <form>
            <div class="form-group">
              <label>Nama Lengkap</label>

              <input type="text" class="form-control" />
            </div>

            <div class="form-group">
              <label>No. Telepon</label>

              <input type="text" class="form-control" />
            </div>

            <div class="form-group">
              <label>Pilih Produk</label>

              <select class="form-control">
                <option>Hoodie Premium</option>

                <option>Sneakers Casual</option>

                <option>Kaos Oversize</option>

                <option>Jaket Parasut</option>

                <option>Kemeja Kalcer</option>

                <option>Sneakers Sport</option>
              </select>
            </div>

            <div class="form-group">
              <label>Ukuran</label>

              <select class="form-control">
                <option>S</option>

                <option>M</option>

                <option>L</option>

                <option>XL</option>

                <option>39</option>

                <option>40</option>

                <option>41</option>

                <option>42</option>

                <option>43</option>
              </select>
            </div>

            <div class="form-group">
              <label>Jumlah</label>

              <input type="number" class="form-control" />
            </div>

            <div class="form-group">
              <label>Alamat</label>

              <textarea class="form-control" rows="4"></textarea>
            </div>

            <button class="btn btn-success btn-lg">Pesan Sekarang</button>
          </form>
        </div>
      </div>
    </div>
